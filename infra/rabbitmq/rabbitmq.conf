# RabbitMQ configuration — Lascodia Trading Engine
#
# Memory watermark: trigger publisher back-pressure when the broker uses 60%
# of available memory, well before the container's 1G hard limit. This prevents
# the kernel OOM killer from terminating the container under tick storms.
vm_memory_high_watermark.relative = 0.6

# Disk free space alarm — block publishers if disk runs low.
disk_free_limit.relative = 1.5
