services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__WriteDbConnection=Host=postgres;Database=LascodiaTradingEngineDb;Username=postgres;Password=${DB_PASSWORD:-postgres};Maximum Pool Size=100;Minimum Pool Size=5
      - ConnectionStrings__ReadDbConnection=Host=postgres;Database=LascodiaTradingEngineDb;Username=postgres;Password=${DB_PASSWORD:-postgres};Maximum Pool Size=100;Minimum Pool Size=5
      - RabbitMQConfig__Host=rabbitmq
      - RabbitMQConfig__Username=${RABBITMQ_USERNAME:-guest}
      - RabbitMQConfig__Password=${RABBITMQ_PASSWORD:-guest}
      - JwtSettings__SecretKey=${JWT_SECRET_KEY:-docker-dev-lascodia-jwt-secret-key-change-in-production-min-32!}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: LascodiaTradingEngineDb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  rabbitmqdata:
  prometheusdata:
  grafanadata:
